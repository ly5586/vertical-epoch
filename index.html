<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>垂直纪元·劳工的诅咒</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e00;
    color: #797962;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 14px 10px;
    user-select: none;
  }

  h1 {
    font-size: 21px;
    letter-spacing: 5px;
    color: #9f9f9f;
    margin-bottom: 1px;
  }
  .subtitle {
    font-size: 10px;
    color: #535624;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  /* ── 资源栏 ── */
  #resource-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .res-item {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #141410;
    border: 1px solid #262613;
    border-radius: 3px;
    padding: 5px 12px;
    min-width: 100px;
  }
  .res-icon { font-size: 15px; width: 20px; text-align: center; opacity: 0.7; }
  .res-info { display: flex; flex-direction: column; }
  .res-label { font-size: 9px; color: #535624; letter-spacing: 1px; }
  .res-value { font-size: 17px; font-weight: bold; }

  .res-labor  .res-value { color: #5b9bd5; }
  .res-food   .res-value { color: #6b8b37; }
  .res-wood   .res-value { color: #b8860b; }
  .res-stone  .res-value { color: #9f9f9f; }

  /* ── 画布 ── */
  #game-canvas {
    border: 1px solid #262613;
    border-radius: 4px;
    cursor: pointer;
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* ── 信息面板 ── */
  #info-panel {
    margin-top: 8px;
    min-height: 34px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  #info-panel .msg {
    font-size: 12px;
    color: #797962;
    padding: 5px 10px;
    background: #141410;
    border: 1px solid #262613;
    border-radius: 3px;
  }
  #info-panel .btn {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid #404040;
    border-radius: 3px;
    background: #141410;
    color: #797962;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  #info-panel .btn:hover { background: #202000; border-color: #535624; color: #9f9f9f; }
  #info-panel .btn:active { background: #262613; }
  #info-panel .btn.disabled { opacity: 0.3; pointer-events: none; }
  #info-panel .btn.danger { border-color: #402020; color: #996666; }
  #info-panel .btn.danger:hover { border-color: #804040; color: #cc8888; background: #1a1010; }

  /* ── 日志 ── */
  #log {
    margin-top: 6px;
    font-size: 10px;
    color: #404020;
    max-width: 700px;
    text-align: center;
    line-height: 1.8;
    max-height: 60px;
    overflow-y: auto;
  }

  /* ── 底部声明 ── */
  #critique {
    margin-top: 12px;
    font-size: 10px;
    color: #404020;
    letter-spacing: 1px;
    text-align: center;
    max-width: 660px;
    line-height: 1.6;
    border-top: 1px solid #1a1a10;
    padding-top: 10px;
  }
  #critique em { color: #535624; font-style: normal; }

  #restart-btn {
    margin-top: 8px;
    font-size: 10px;
    padding: 4px 12px;
    border: 1px solid #262613;
    border-radius: 3px;
    background: transparent;
    color: #404020;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #restart-btn:hover { color: #797962; border-color: #404040; }

  /* 键盘提示 */
  .hint {
    font-size: 9px;
    color: #333310;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<h1>垂直纪元·劳工的诅咒</h1>
<div class="subtitle">VERTICAL EPOCH: THE WORKER'S CURSE</div>

<div id="resource-bar">
  <div class="res-item res-labor">
    <span class="res-icon">&#x2692;</span>
    <div class="res-info">
      <span class="res-label">劳动力 / 工时</span>
      <span class="res-value" id="val-labor">80</span>
    </div>
  </div>
  <div class="res-item res-food">
    <span class="res-icon">&#x2618;</span>
    <div class="res-info">
      <span class="res-label">食物</span>
      <span class="res-value" id="val-food">50</span>
    </div>
  </div>
  <div class="res-item res-wood">
    <span class="res-icon">&#x26D0;</span>
    <div class="res-info">
      <span class="res-label">木材</span>
      <span class="res-value" id="val-wood">30</span>
    </div>
  </div>
  <div class="res-item res-stone">
    <span class="res-icon">&#x26F0;</span>
    <div class="res-info">
      <span class="res-label">石材</span>
      <span class="res-value" id="val-stone">25</span>
    </div>
  </div>
</div>

<canvas id="game-canvas" width="780" height="560"></canvas>

<div id="info-panel">
  <span class="msg">点击空地块建造 &nbsp;|&nbsp; 点击建筑进行劳动 &nbsp;|&nbsp; 数字键 1-5 快捷建造</span>
</div>

<div id="log"></div>

<div id="critique">
  <em>「本游戏模拟现实劳动逻辑：你的每次点击产生真实价值，游戏内没有虚拟货币体系让你陷入资本陷阱。」</em><br>
  技术提升不会减少你的劳动时间 —— 它只会提高资本对剩余价值的榨取效率。
</div>

<button id="restart-btn">重新开始</button>
<div class="hint">快捷键：选中空地按 1-5 建造 &nbsp;|&nbsp; 选中建筑按 Enter 工作 &nbsp;|&nbsp; Delete 拆除</div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  垂直纪元·劳工的诅咒 — 经济批判原型                        ║
// ║  调色板：提取自参考图像的暗夜垂直城市                       ║
// ╚══════════════════════════════════════════════════════════════╝

// ── 调色板 (来自 palette.json) ──
const P = {
  sky_top:    '#0e0e00',
  sky_mid:    '#202000',
  sky_low:    '#404020',
  shadow:     '#0e0e00',
  shadow_mid: '#262613',
  primary:    '#404020',
  primary_dk: '#202000',
  secondary:  '#324020',
  secondary2: '#0a2000',
  highlight:  '#797962',
  highlight2: '#9f9f9f',
  accent_warm:'#535624',
  accent_cool:'#200019',
  brown_dk:   '#402000',
  brown_md:   '#604020',
  gray_md:    '#404040',
  grid_bg:    '#121210',
  grid_line:  '#1e1e18',
  window_lit: '#6a6a2e',
  moon:       '#c8c8a0'
};

// ── 建筑定义 ──
const BLD = {
  HOUSING: {
    id: 'housing', name: '住宅', icon: '\u{1F3E0}',
    cost: { labor: 10, wood: 10, stone: 5 },
    work: null,
    passive: { labor: 2, food: -1 },
    color: '#404040', roomColor: '#1a1a18', accent: P.window_lit,
    desc: '提供劳动力再生，消耗食物'
  },
  FARM: {
    id: 'farm', name: '农场', icon: '\u{1F33E}',
    cost: { labor: 5, wood: 5 },
    work: { cost: { labor: 3 }, produce: { food: 5 } },
    passive: null,
    color: '#2a3a18', roomColor: '#1a2410', accent: '#4a6a2a',
    desc: '消耗劳动力生产食物'
  },
  LUMBER: {
    id: 'lumber', name: '伐木场', icon: '\u{1FAB5}',
    cost: { labor: 5, stone: 5 },
    work: { cost: { labor: 3 }, produce: { wood: 5 } },
    passive: null,
    color: P.brown_md, roomColor: '#2a1a0a', accent: '#8a5a2a',
    desc: '消耗劳动力生产木材'
  },
  MINE: {
    id: 'mine', name: '矿场', icon: '\u{26CF}\u{FE0F}',
    cost: { labor: 5, wood: 5 },
    work: { cost: { labor: 3 }, produce: { stone: 5 } },
    passive: null,
    color: '#404040', roomColor: '#1a1a1a', accent: '#606060',
    desc: '消耗劳动力生产石材'
  },
  MARKET: {
    id: 'market', name: '市场', icon: '\u{1F3EA}',
    cost: { labor: 15, wood: 15, stone: 10 },
    work: { cost: { labor: 2 }, trade: true },
    passive: null,
    color: P.highlight, roomColor: '#1a1a10', accent: P.accent_warm,
    desc: '消耗劳动力进行资源交易'
  }
};

const BLD_LIST = [BLD.HOUSING, BLD.FARM, BLD.LUMBER, BLD.MINE, BLD.MARKET];

// ── 游戏状态 ──
const GRID_COLS = 6, GRID_ROWS = 6;
const state = {
  grid: Array.from({ length: GRID_ROWS }, () => Array(GRID_COLS).fill(null)),
  res: { labor: 80, food: 50, wood: 30, stone: 25 },
  selectedCell: null,
  tickCount: 0,
  logMessages: []
};

// ── Canvas ──
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// 网格布局 — 嵌入城市建筑群中
const GRID_X = 65, GRID_Y = 90;
const CELL_W = 100, CELL_H = 64;
const GRID_W = GRID_COLS * CELL_W;
const GRID_H = GRID_ROWS * CELL_H;
const GROUND_Y = GRID_Y + GRID_H + 14; // 地面线

// ── DOM 引用 ──
const infoPanel = document.getElementById('info-panel');
const logDiv = document.getElementById('log');

// ── 辅助 ──
function addRes(key, amount) { state.res[key] = Math.max(0, state.res[key] + amount); }
function canAfford(costs) { for (const [k, v] of Object.entries(costs)) { if ((state.res[k] || 0) < v) return false; } return true; }
function payCost(costs) { for (const [k, v] of Object.entries(costs)) state.res[k] -= v; }

function log(msg) {
  state.logMessages.unshift(msg);
  if (state.logMessages.length > 5) state.logMessages.pop();
  logDiv.innerHTML = state.logMessages.map(m => m).join('<br>');
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function lerpHex(h1, h2, t) {
  const r1 = parseInt(h1.slice(1,3),16), g1 = parseInt(h1.slice(3,5),16), b1 = parseInt(h1.slice(5,7),16);
  const r2 = parseInt(h2.slice(1,3),16), g2 = parseInt(h2.slice(3,5),16), b2 = parseInt(h2.slice(5,7),16);
  const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
  return '#' + [r,g,b].map(c => ('0' + c.toString(16)).slice(-2)).join('');
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ═══════════════════════════════════════════════════════════
//  渲染：垂直城市背景
// ═══════════════════════════════════════════════════════════

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y + 80);
  grad.addColorStop(0,    P.sky_top);
  grad.addColorStop(0.3,  P.sky_top);
  grad.addColorStop(0.55, P.sky_mid);
  grad.addColorStop(0.75, lerpHex(P.sky_mid, P.primary, 0.5));
  grad.addColorStop(0.9,  P.primary);
  grad.addColorStop(1,    P.primary_dk);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星星
  for (let i = 0; i < 200; i++) {
    const sx = (i * 273 + 41) % W;
    const sy = (i * 157 + 83) % (GROUND_Y * 0.6);
    const sr = 0.3 + (i % 10) * 0.15;
    const sa = 0.15 + (i % 7) * 0.1;
    ctx.fillStyle = hexAlpha(P.highlight2, sa);
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  // 月亮
  const moonX = W * 0.74, moonY = 82, moonR = 38;
  const glowGrad = ctx.createRadialGradient(moonX, moonY, moonR * 0.6, moonX, moonY, moonR * 4);
  glowGrad.addColorStop(0, hexAlpha(P.moon, 0.18));
  glowGrad.addColorStop(0.4, hexAlpha(P.moon, 0.05));
  glowGrad.addColorStop(1, hexAlpha(P.moon, 0));
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 4, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = P.moon;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2); ctx.fill();
}

// 远山
function drawMountains() {
  function range(baseY, amp, color, segs, seed) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let i = 0; i <= segs; i++) {
      const x = i * W / segs;
      const t = i / segs;
      const y = baseY
        - Math.abs(Math.sin(t * Math.PI + seed)) * amp * 0.6
        - Math.abs(Math.sin(t * 5.5 + seed * 2.1)) * amp * 0.25
        - Math.abs(Math.sin(t * 11 + seed * 3.7)) * amp * 0.15;
      ctx.lineTo(x, Math.max(y, baseY - amp));
    }
    ctx.lineTo(W, baseY);
    ctx.closePath();
    ctx.fill();
  }

  const mBase = GROUND_Y - 8;
  range(mBase, 140, P.secondary2, 32, 0.3);
  range(mBase + 6, 110, P.shadow_mid, 28, 1.7);
  range(mBase + 12, 70, P.primary_dk, 24, 3.1);
}

// 城市建筑层
function drawCityLayer(yBase, minH, maxH, colors, litRatio, count, opacity) {
  const buildings = [];
  let totalW = 0;
  for (let i = 0; i < count && totalW < W; i++) {
    let bw = 16 + ((i * 91 + 37) % 60);
    const bh = minH + ((i * 73 + 19) % (maxH - minH + 1));
    if (totalW + bw > W) bw = W - totalW;
    if (bw < 10) break;
    buildings.push({ x: totalW, w: bw, h: bh, color: pick(colors) });
    totalW += bw + (1 + (i % 5));
  }
  buildings.sort((a, b) => a.h - b.h);

  for (const b of buildings) {
    const by = yBase - b.h;
    ctx.fillStyle = b.color;
    ctx.globalAlpha = opacity;
    ctx.fillRect(b.x, by, b.w, b.h);

    // 屋顶设施
    if (b.h > 70 && Math.random() < 0.25) {
      const rw = b.w * (0.25 + Math.random() * 0.35);
      const rh = 6 + Math.random() * 14;
      ctx.fillRect(b.x + (b.w - rw) / 2, by - rh, rw, rh);
    }

    // 窗户
    const margin = 5, winW = 4, winH = 5, gapX = 7, gapY = 8;
    const cols = Math.floor((b.w - margin * 2) / gapX);
    const rows = Math.floor((b.h - margin * 2) / gapY);
    if (cols >= 2 && rows >= 2) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const wx = b.x + margin + c * gapX;
          const wy = by + margin + r * gapY;
          if (wx + winW > b.x + b.w - margin || wy + winH > by + b.h - margin) continue;

          if (Math.random() < litRatio) {
            const alpha = 0.4 + Math.random() * 0.5;
            ctx.fillStyle = hexAlpha(P.window_lit, alpha * opacity);
            ctx.fillRect(wx, wy, winW, winH);
          } else if (opacity > 0.5) {
            ctx.fillStyle = hexAlpha('#000000', 0.3);
            ctx.fillRect(wx, wy, winW, winH);
          }
        }
      }
    }
  }
  ctx.globalAlpha = 1;
}

// 前景塔楼
function drawTowers() {
  function tower(x, yBase, w, h, color) {
    const y = yBase - h;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, yBase);
    ctx.lineTo(x + w * 0.2, y + h * 0.25);
    ctx.lineTo(x + w * 0.5, y);
    ctx.lineTo(x + w * 0.8, y + h * 0.25);
    ctx.lineTo(x + w, yBase);
    ctx.closePath();
    ctx.fill();

    // 窗户
    const margin = 6, winW = 3, winH = 5, gapX = 6, gapY = 8;
    const cols = Math.floor((w * 0.5 - margin * 2) / gapX);
    const rows = Math.floor((h * 0.55 - margin * 2) / gapY);
    if (cols >= 2 && rows >= 2) {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const wx = x + w * 0.25 + margin + c * gapX;
          const wy = y + h * 0.3 + margin + r * gapY;
          if (Math.random() < 0.55) {
            ctx.fillStyle = hexAlpha(P.window_lit, 0.5 + Math.random() * 0.4);
            ctx.fillRect(wx, wy, winW, winH);
          }
        }
      }
    }
  }

  tower(24, GROUND_Y, 36, 340, P.primary_dk);
  tower(W - 60, GROUND_Y, 32, 280, P.primary_dk);
  tower(W * 0.88, GROUND_Y, 28, 220, P.shadow_mid);
}

// 地面与雾气
function drawGround() {
  const grad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grad.addColorStop(0,    P.shadow_mid);
  grad.addColorStop(0.08, P.shadow);
  grad.addColorStop(1,    '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // 街灯
  for (let i = 0; i < 9; i++) {
    const lx = W * 0.06 + i * W * 0.11;
    const ly = GROUND_Y + 14;
    const lampGlow = ctx.createRadialGradient(lx, ly, 3, lx, ly, 40);
    lampGlow.addColorStop(0, hexAlpha(P.accent_warm, 0.4));
    lampGlow.addColorStop(1, hexAlpha(P.accent_warm, 0));
    ctx.fillStyle = lampGlow;
    ctx.beginPath(); ctx.arc(lx, ly, 40, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = P.accent_warm;
    ctx.beginPath(); ctx.arc(lx, ly, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // 雾气
  const fogGrad = ctx.createLinearGradient(0, GROUND_Y - 100, 0, H);
  fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
  fogGrad.addColorStop(0.3, hexAlpha(P.primary_dk, 0.12));
  fogGrad.addColorStop(0.7, hexAlpha(P.shadow, 0.45));
  fogGrad.addColorStop(1, 'rgba(0,0,0,0.8)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════════
//  渲染：网格——建筑剖面图
// ═══════════════════════════════════════════════════════════

function drawGridFrame() {
  // 网格背后的建筑结构框架
  const fx = GRID_X - 8, fy = GRID_Y - 8;
  const fw = GRID_W + 16, fh = GRID_H + 16;

  // 外框
  ctx.strokeStyle = P.gray_md;
  ctx.lineWidth = 3;
  ctx.strokeRect(fx, fy, fw, fh);

  // 填充
  ctx.fillStyle = hexAlpha('#0a0a08', 0.6);
  ctx.fillRect(fx + 3, fy + 3, fw - 6, fh - 6);

  // 横梁（楼层分隔）
  ctx.strokeStyle = P.grid_line;
  ctx.lineWidth = 1;
  for (let row = 0; row <= GRID_ROWS; row++) {
    const ly = GRID_Y + row * CELL_H;
    ctx.beginPath();
    ctx.moveTo(GRID_X, ly);
    ctx.lineTo(GRID_X + GRID_W, ly);
    ctx.stroke();
  }

  // 竖梁（房间分隔）
  for (let col = 0; col <= GRID_COLS; col++) {
    const lx = GRID_X + col * CELL_W;
    ctx.beginPath();
    ctx.moveTo(lx, GRID_Y);
    ctx.lineTo(lx, GRID_Y + GRID_H);
    ctx.stroke();
  }

  // 钢筋铆钉（交点处小方块）
  ctx.fillStyle = P.grid_line;
  for (let row = 0; row <= GRID_ROWS; row++) {
    for (let col = 0; col <= GRID_COLS; col++) {
      ctx.fillRect(GRID_X + col * CELL_W - 2, GRID_Y + row * CELL_H - 2, 5, 5);
    }
  }
}

function drawCell(row, col) {
  const x = GRID_X + col * CELL_W;
  const y = GRID_Y + row * CELL_H;
  const bldId = state.grid[row][col];
  const bld = bldId ? BLD_LIST.find(b => b.id === bldId) : null;

  ctx.save();

  // 裁切到格子内
  ctx.beginPath();
  ctx.rect(x + 1, y + 1, CELL_W - 2, CELL_H - 2);
  ctx.clip();

  // 房间底色
  ctx.fillStyle = bld ? (bld.roomColor || '#1a1a18') : '#0e0e0c';
  ctx.fillRect(x + 1, y + 1, CELL_W - 2, CELL_H - 2);

  if (bld) {
    drawRoomInterior(bld, x, y, CELL_W, CELL_H);
  } else {
    // 空房间：微弱的灰尘/斑驳
    ctx.fillStyle = hexAlpha('#1a1a14', 0.3);
    ctx.fillRect(x + CELL_W * 0.3, y + CELL_H * 0.5, CELL_W * 0.4, CELL_H * 0.15);
  }

  ctx.restore();
}

function drawRoomInterior(bld, x, y, w, h) {
  const cx = x + w / 2, cy = y + h / 2;

  switch (bld.id) {

    case 'housing': {
      // 温暖的居住空间：床 + 台灯光晕
      const glowGrad = ctx.createRadialGradient(cx + 10, cy - 4, w * 0.08, cx + 10, cy - 4, w * 0.4);
      glowGrad.addColorStop(0, hexAlpha(bld.accent, 0.35));
      glowGrad.addColorStop(1, hexAlpha(bld.accent, 0));
      ctx.fillStyle = glowGrad;
      ctx.fillRect(x, y, w, h);

      // 床
      ctx.fillStyle = '#3a3028';
      ctx.fillRect(cx - 18, cy + 2, 36, 16);
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(cx - 16, cy + 4, 32, 5);
      // 枕头
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(cx + 6, cy + 5, 10, 8);
      // 小窗户（月光透入）
      ctx.fillStyle = hexAlpha(P.moon, 0.25);
      ctx.fillRect(x + w - 16, y + 6, 10, 10);
      ctx.strokeStyle = '#404040';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(x + w - 16, y + 6, 10, 10);
      // 窗棂十字
      ctx.beginPath();
      ctx.moveTo(x + w - 11, y + 6); ctx.lineTo(x + w - 11, y + 16);
      ctx.moveTo(x + w - 16, y + 11); ctx.lineTo(x + w - 6, y + 11);
      ctx.stroke();
      break;
    }

    case 'farm': {
      // 室内农场：种植架 + 生长灯
      // 生长灯光晕
      const glowGrad = ctx.createRadialGradient(cx, cy - 10, w * 0.1, cx, cy - 10, w * 0.45);
      glowGrad.addColorStop(0, hexAlpha('#4a6a2a', 0.3));
      glowGrad.addColorStop(1, hexAlpha('#4a6a2a', 0));
      ctx.fillStyle = glowGrad;
      ctx.fillRect(x, y, w, h);

      // 种植架（三层）
      for (let shelf = 0; shelf < 3; shelf++) {
        const sy = y + 10 + shelf * 16;
        ctx.fillStyle = '#3a2a18';
        ctx.fillRect(x + 6, sy, w - 12, 3);
        // 作物
        ctx.fillStyle = '#3a5a1a';
        for (let p = 0; p < 5; p++) {
          const px = x + 14 + p * (w - 28) / 4;
          ctx.fillRect(px - 1.5, sy - 5 - (p % 3) * 2, 3, 5 + (p % 3) * 2);
        }
      }
      // 水管
      ctx.strokeStyle = '#4a4a4a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + w - 10, y + 4);
      ctx.lineTo(x + w - 10, y + h - 6);
      ctx.stroke();
      break;
    }

    case 'lumber': {
      // 木材加工间：木料堆 + 锯
      // 原木堆
      const logColors = ['#8a6a3a', '#7a5a2a', '#6a4a1a', '#9a7a4a'];
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = logColors[i];
        ctx.fillRect(x + 8 + i * 14, cy - 2 - i * 2, 16, 8);
        ctx.strokeStyle = '#4a3010';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x + 8 + i * 14, cy - 2 - i * 2, 16, 8);
      }
      // 锯片
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.arc(cx + 20, cy - 8, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aaa';
      ctx.beginPath();
      ctx.arc(cx + 20, cy - 8, 4, 0, Math.PI * 2);
      ctx.fill();
      // 锯台
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(cx + 4, cy + 6, 24, 6);
      break;
    }

    case 'mine': {
      // 矿场：岩壁 + 矿车 + 暗色氛围
      // 岩壁纹理
      ctx.fillStyle = '#2a2a2a';
      for (let i = 0; i < 6; i++) {
        const rx = x + 4 + i * (w - 8) / 5;
        const ry = y + 2 + (i % 2) * 6;
        ctx.fillRect(rx, ry, (w - 8) / 5 - 1, h * 0.35);
      }
      // 矿道入口
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.arc(cx, cy + 2, 10, Math.PI, 0);
      ctx.fill();
      // 轨道
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 4, cy + 10);
      ctx.lineTo(cx, cy + 7);
      ctx.lineTo(x + w - 4, cy + 10);
      ctx.stroke();
      // 矿石亮点
      ctx.fillStyle = hexAlpha('#8a8a8a', 0.6);
      ctx.beginPath(); ctx.arc(cx - 8, cy - 4, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 12, cy - 2, 1.5, 0, Math.PI * 2); ctx.fill();
      break;
    }

    case 'market': {
      // 市场：摊位 + 货架
      // 暖光
      const glowGrad = ctx.createRadialGradient(cx, cy, w * 0.15, cx, cy, w * 0.5);
      glowGrad.addColorStop(0, hexAlpha(P.accent_warm, 0.3));
      glowGrad.addColorStop(1, hexAlpha(P.accent_warm, 0));
      ctx.fillStyle = glowGrad;
      ctx.fillRect(x, y, w, h);

      // 柜台
      ctx.fillStyle = '#4a3a28';
      ctx.fillRect(x + 8, cy + 2, w - 16, 12);
      ctx.fillStyle = '#5a4a38';
      ctx.fillRect(x + 8, cy + 2, w - 16, 3);
      // 货架
      ctx.fillStyle = '#3a2a18';
      ctx.fillRect(x + 6, cy - 10, 10, 12);
      ctx.fillRect(x + w - 16, cy - 10, 10, 12);
      // 商品
      ctx.fillStyle = '#cc6644'; ctx.beginPath(); ctx.arc(cx - 10, cy, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ddcc44'; ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#66aa44'; ctx.beginPath(); ctx.arc(cx + 10, cy, 2.5, 0, Math.PI * 2); ctx.fill();
      // 招牌
      ctx.fillStyle = hexAlpha(P.highlight, 0.5);
      ctx.fillRect(cx - 14, y + 4, 28, 8);
      break;
    }
  }

  // 建筑名称标签（底部居中）
  ctx.fillStyle = hexAlpha('#797962', 0.5);
  ctx.font = '9px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText(bld.name, cx, y + h - 5);
}

function drawSelectionHighlight() {
  if (!state.selectedCell) return;
  const { row, col } = state.selectedCell;
  const x = GRID_X + col * CELL_W;
  const y = GRID_Y + row * CELL_H;

  ctx.save();
  ctx.strokeStyle = P.accent_warm;
  ctx.lineWidth = 2;
  ctx.shadowColor = P.accent_warm;
  ctx.shadowBlur = 8;
  ctx.strokeRect(x + 1, y + 1, CELL_W - 2, CELL_H - 2);
  ctx.restore();
}

// 楼层和列号标签
function drawLabels() {
  ctx.save();
  ctx.fillStyle = '#404020';
  ctx.font = '10px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  for (let col = 0; col < GRID_COLS; col++) {
    ctx.fillText((col + 1) + '号', GRID_X + col * CELL_W + CELL_W / 2, GRID_Y - 6);
  }
  ctx.textAlign = 'right';
  for (let row = 0; row < GRID_ROWS; row++) {
    const floorNum = GRID_ROWS - row;
    ctx.fillText(floorNum + 'F', GRID_X - 8, GRID_Y + row * CELL_H + CELL_H / 2 + 3);
  }
  ctx.restore();
}

// 网格标题
function drawGridTitle() {
  ctx.save();
  ctx.fillStyle = P.highlight;
  ctx.font = '11px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('— 建筑剖面 —', GRID_X + GRID_W / 2, GRID_Y + GRID_H + 26);
  ctx.restore();
}

// ── 主渲染 ──
function render() {
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawMountains();

  // 远层城市建筑（网格后方）
  const backColors = [P.primary_dk, P.shadow_mid, P.secondary2, P.primary, P.secondary];
  drawCityLayer(GROUND_Y, 30, 120, backColors, 0.2, 40, 0.7);

  // 中层城市建筑
  const midColors = [P.primary_dk, P.primary, P.shadow_mid, P.secondary, P.secondary2];
  drawCityLayer(GROUND_Y, 80, 200, midColors, 0.3, 28, 0.85);

  // 网格
  drawGridFrame();
  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      drawCell(row, col);
    }
  }
  drawSelectionHighlight();
  drawLabels();
  drawGridTitle();

  // 前景建筑（网格两侧，局部遮挡营造景深感）
  const frontColors = [P.primary_dk, P.primary, P.shadow_mid];
  // 只画左右两侧的建筑片段
  ctx.save();
  // 左侧前景建筑片段
  const leftBld = [
    { x: 8,  w: 28, h: 260, c: P.primary_dk },
    { x: 38, w: 20, h: 180, c: P.shadow_mid },
  ];
  for (const b of leftBld) {
    const by = GROUND_Y - b.h;
    ctx.fillStyle = b.c;
    ctx.fillRect(b.x, by, b.w, b.h);
    // 窗户
    for (let wy = by + 10; wy < GROUND_Y - 10; wy += 9) {
      for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 7) {
        if (Math.random() < 0.4) {
          ctx.fillStyle = hexAlpha(P.window_lit, 0.5);
          ctx.fillRect(wx, wy, 3, 4);
        }
      }
    }
  }
  // 右侧前景建筑片段
  const rightBld = [
    { x: W - 36, w: 28, h: 300, c: P.shadow_mid },
    { x: W - 56, w: 20, h: 200, c: P.primary_dk },
  ];
  for (const b of rightBld) {
    const by = GROUND_Y - b.h;
    ctx.fillStyle = b.c;
    ctx.fillRect(b.x, by, b.w, b.h);
    for (let wy = by + 10; wy < GROUND_Y - 10; wy += 9) {
      for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 7) {
        if (Math.random() < 0.4) {
          ctx.fillStyle = hexAlpha(P.window_lit, 0.5);
          ctx.fillRect(wx, wy, 3, 4);
        }
      }
    }
  }
  ctx.restore();

  // 塔楼
  drawTowers();

  // 地面与雾气
  drawGround();
}

// ── UI 更新 ──
function updateResourceDisplay() {
  document.getElementById('val-labor').textContent = Math.floor(state.res.labor);
  document.getElementById('val-food').textContent  = Math.floor(state.res.food);
  document.getElementById('val-wood').textContent  = Math.floor(state.res.wood);
  document.getElementById('val-stone').textContent = Math.floor(state.res.stone);
}

function updateInfoPanel() {
  const sel = state.selectedCell;
  if (!sel) {
    infoPanel.innerHTML = '<span class="msg">点击空地块建造 &nbsp;|&nbsp; 点击建筑进行劳动 &nbsp;|&nbsp; 数字键 1-5 快捷建造</span>';
    return;
  }

  const { row, col } = sel;
  const bldId = state.grid[row][col];
  const floor = GRID_ROWS - row;

  if (bldId) {
    const bld = BLD_LIST.find(b => b.id === bldId);
    let html = '<span class="msg">' + bld.icon + ' <b>' + bld.name + '</b> &nbsp;' + floor + 'F-' + (col + 1) + '号 &nbsp;—&nbsp; ' + bld.desc + '</span>';

    if (bld.work) {
      if (bld.work.trade) {
        html += '<button class="btn" onclick="marketTrade(\'food\')">换食物 (2劳力→3食物)</button>';
        html += '<button class="btn" onclick="marketTrade(\'wood\')">换木材 (2劳力→3木材)</button>';
        html += '<button class="btn" onclick="marketTrade(\'stone\')">换石材 (2劳力→3石材)</button>';
      } else {
        const costStr = Object.entries(bld.work.cost)
          .map(([k, v]) => v + { labor: '劳力', food: '食物', wood: '木材', stone: '石材' }[k]).join('+');
        const prodStr = Object.entries(bld.work.produce)
          .map(([k, v]) => '+' + v + { labor: '劳力', food: '食物', wood: '木材', stone: '石材' }[k]).join(' ');
        const canWork = canAfford(bld.work.cost);
        html += '<button class="btn' + (canWork ? '' : ' disabled') + '" onclick="doWork()">'
          + '工作 (消耗' + costStr + ' → ' + prodStr + ')</button>';
      }
    } else {
      html += '<span class="msg" style="color:#404020">（被动：每2秒 +2劳力 −1食物）</span>';
    }

    html += '<button class="btn danger" onclick="demolishBuilding()">拆除（退50%材料）</button>';
    infoPanel.innerHTML = html;
  } else {
    let html = '<span class="msg">空地 ' + floor + 'F-' + (col + 1) + '号 &nbsp;—&nbsp; 选择建造：</span>';
    for (let i = 0; i < BLD_LIST.length; i++) {
      const bld = BLD_LIST[i];
      const costStr = Object.entries(bld.cost)
        .map(([k, v]) => v + { labor: '劳力', food: '食物', wood: '木材', stone: '石材' }[k]).join('+');
      const afford = canAfford(bld.cost);
      html += '<button class="btn' + (afford ? '' : ' disabled') + '" onclick="doBuild(\'' + bld.id + '\')">'
        + '<b>' + (i + 1) + '</b> ' + bld.icon + ' ' + bld.name + ' (' + costStr + ')</button>';
    }
    infoPanel.innerHTML = html;
  }
}

// ── 游戏逻辑 ──
function doBuild(bldId) {
  const sel = state.selectedCell;
  if (!sel) return;
  const { row, col } = sel;
  if (state.grid[row][col] !== null) return;

  const bld = BLD_LIST.find(b => b.id === bldId);
  if (!canAfford(bld.cost)) {
    log('⚠ 资源不足，无法建造 ' + bld.name);
    updateInfoPanel();
    return;
  }

  payCost(bld.cost);
  state.grid[row][col] = bldId;
  log('建造了 ' + bld.name + '（' + (GRID_ROWS - row) + 'F-' + (col + 1) + '号）');
  updateResourceDisplay();
  updateInfoPanel();
  render();
}

function doWork() {
  const sel = state.selectedCell;
  if (!sel) return;
  const { row, col } = sel;
  const bldId = state.grid[row][col];
  if (!bldId) return;

  const bld = BLD_LIST.find(b => b.id === bldId);
  if (!bld || !bld.work || bld.work.trade) return;

  if (!canAfford(bld.work.cost)) {
    log('⚠ 劳动力不足，无法在 ' + bld.name + ' 工作');
    updateInfoPanel();
    return;
  }

  payCost(bld.work.cost);
  for (const [k, v] of Object.entries(bld.work.produce)) addRes(k, v);

  const prodStr = Object.entries(bld.work.produce)
    .map(([k, v]) => '+' + v + { labor: '劳力', food: '食物', wood: '木材', stone: '石材' }[k]).join(' ');
  log('在 ' + bld.name + ' 劳动 — ' + prodStr);
  updateResourceDisplay();
  updateInfoPanel();
  render();
}

function marketTrade(resType) {
  const sel = state.selectedCell;
  if (!sel) return;
  if (state.grid[sel.row][sel.col] !== 'market') return;

  if (!canAfford({ labor: 2 })) {
    log('⚠ 劳动力不足，无法交易');
    updateInfoPanel();
    return;
  }

  payCost({ labor: 2 });
  addRes(resType, 3);
  const resName = { food: '食物', wood: '木材', stone: '石材' }[resType];
  log('在市场交易：消耗2劳力 → +3' + resName);
  updateResourceDisplay();
  updateInfoPanel();
  render();
}

function demolishBuilding() {
  const sel = state.selectedCell;
  if (!sel) return;
  const { row, col } = sel;
  const bldId = state.grid[row][col];
  if (!bldId) return;

  const bld = BLD_LIST.find(b => b.id === bldId);
  if (bld.cost.wood) addRes('wood', Math.floor(bld.cost.wood * 0.5));
  if (bld.cost.stone) addRes('stone', Math.floor(bld.cost.stone * 0.5));

  state.grid[row][col] = null;
  log('拆除了 ' + bld.name + '，退还部分材料');
  updateResourceDisplay();
  updateInfoPanel();
  render();
}

// ── 每2秒世界tick ──
function gameTick() {
  state.tickCount++;

  let laborDelta = 0, foodDelta = 0;
  let housingCount = 0, otherCount = 0;

  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      const bldId = state.grid[row][col];
      if (!bldId) continue;
      const bld = BLD_LIST.find(b => b.id === bldId);
      if (bld.passive) {
        laborDelta += bld.passive.labor || 0;
        foodDelta += bld.passive.food || 0;
        housingCount++;
      } else {
        otherCount++;
      }
    }
  }

  // 维护消耗：每个非住宅建筑消耗0.5劳动力
  laborDelta -= Math.floor(otherCount * 0.5);
  // 基础生存消耗
  laborDelta -= 1;

  addRes('labor', laborDelta);
  addRes('food', foodDelta);

  updateResourceDisplay();

  if (state.res.labor <= 0) {
    log('⚠ 劳动力耗尽！建造更多住宅或拆除部分建筑以恢复平衡。');
  }
  if (state.res.food <= 0 && housingCount > 0) {
    log('⚠ 食物耗尽！住宅无法再生产劳动力。');
  }
}

// ── Canvas 点击 ──
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const col = Math.floor((mx - GRID_X) / CELL_W);
  const row = Math.floor((my - GRID_Y) / CELL_H);

  if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) {
    state.selectedCell = null;
    updateInfoPanel();
    render();
    return;
  }

  if (state.selectedCell && state.selectedCell.row === row && state.selectedCell.col === col) {
    state.selectedCell = null;
  } else {
    state.selectedCell = { row, col };
  }

  updateInfoPanel();
  render();
});

// ── 键盘 ──
document.addEventListener('keydown', (e) => {
  if (!state.selectedCell) return;
  const sel = state.selectedCell;
  const bldId = state.grid[sel.row][sel.col];

  if (!bldId) {
    const idx = ['1','2','3','4','5'].indexOf(e.key);
    if (idx >= 0 && idx < BLD_LIST.length) doBuild(BLD_LIST[idx].id);
  } else {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doWork(); }
    if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); demolishBuilding(); }
  }
});

// ── 重新开始 ──
document.getElementById('restart-btn').addEventListener('click', () => {
  state.grid = Array.from({ length: GRID_ROWS }, () => Array(GRID_COLS).fill(null));
  state.res = { labor: 80, food: 50, wood: 30, stone: 25 };
  state.selectedCell = null;
  state.tickCount = 0;
  state.logMessages = [];
  logDiv.innerHTML = '';
  updateResourceDisplay();
  updateInfoPanel();
  render();
  log('游戏已重置。每次点击都代表真实的劳动价值。');
});

// ── 启动 ──
function init() {
  updateResourceDisplay();
  updateInfoPanel();
  render();
  log('垂直纪元·劳工的诅咒 — 所有资源须通过劳动获得。');
  setInterval(gameTick, 2000);
}

init();
</script>
