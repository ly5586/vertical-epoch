// ╔══════════════════════════════════════════════════════════════════╗

// ═════════════════════════════════════════════════════════════
//  法一：DEFINES — 万象皆数，聚于一册，分层而治
// ═════════════════════════════════════════════════════════════

};
const BLD_LIST = Object.values(DEF.buildingDefs);

// ═════════════════════════════════════════════════════════════
//  法二：LAYOUT — 布局统位，仿 positionType
// ═════════════════════════════════════════════════════════════

const LAY = {

  elevator: { x:52, y:100, w:38, xInner:4, trackTop:100, trackH:396 },
  grid: { x:100, y:100, cellW:100, cellH:66 },
  beams: { h:7, v:4 },
  ground: { y:520 },
  // 格子内相对坐标 — 为各建筑定义器物位
  furniture: {

    ],
    farm: [
      { n:'种植架①', x:8,y:12,w:28,h:32, action:'work', draw:'plantShelf' },
      { n:'种植架②', x:38,y:12,w:28,h:32, action:'work', draw:'plantShelf' },
      { n:'种植架③', x:68,y:12,w:24,h:32, action:'work', draw:'plantShelf' },

    ],

      { n:'原木堆②', x:30,y:24,w:22,h:22, draw:'logPile' },
      { n:'锯台', x:58,y:26,w:28,h:20, action:'work', draw:'sawTable' },
      { n:'木屑堆', x:80,y:40,w:14,h:10, draw:'sawdust' },
    ],
    mine: [
      { n:'矿车', x:12,y:30,w:24,h:16, draw:'mineCart' },
      { n:'轨道', x:6,y:46,w:42,h:6, draw:'rail' },
      { n:'岩壁', x:60,y:4,w:36,h:48, draw:'rockFace' },

    ],
    market: [
      { n:'柜台', x:10,y:30,w:46,h:18, action:'work', draw:'counter' },
      { n:'货架左', x:62,y:14,w:14,h:24, draw:'shelf' },
      { n:'货架右', x:80,y:14,w:14,h:24, draw:'shelf' },

    ],
  }
};

// ═════════════════════════════════════════════════════════════
//  法三：经济范畴 — 父子相承，修饰自生
// ═════════════════════════════════════════════════════════════

const ECO = {
  housing_service:  { parent:null,       desc:'居住服务',  icon:'\u{1F3E0}' },
  food_production:  { parent:'production', desc:'食物生产',  icon:'\u{1F33E}' },
  wood_production:  { parent:'production', desc:'木材生产',  icon:'\u{1FAB5}' },
  stone_production: { parent:'production', desc:'石材生产',  icon:'\u{26F0}' },
  trade_service:    { parent:null,       desc:'交易服务',  icon:'\u{1F3EA}' },
  production:       { parent:null,       desc:'生产部门',  icon:'\u{2692}' },
};

// 查某范畴之全祖先（含自身）
function categoryAncestors(cat) {
  var a = [cat];
  var c = ECO[cat];
  while (c && c.parent) { a.push(c.parent); c = ECO[c.parent]; }
  return a;
}

// ═════════════════════════════════════════════════════════════
//  法四：规则引擎 — 先验后行，败则有释
// ═════════════════════════════════════════════════════════════

function countBuildings(bldId) {
  var n = 0;
  for (var r = 0; r < DEF.grid.rows; r++)
    for (var c = 0; c < DEF.grid.cols; c++)
      if (state.grid[r][c] === bldId) n++;
  return n;
}

function countOnFloor(bldId, row) {
  var n = 0;
  for (var c = 0; c < DEF.grid.cols; c++)
    if (state.grid[row][c] === bldId) n++;
  return n;
}

function checkPrerequisites(prereq) {
  if (!prereq) return true;
  if (prereq.buildings) {
    for (var bId in prereq.buildings) {
      if (countBuildings(bId) < prereq.buildings[bId]) return false;
    }
  }
  return true;
}

function prereqMissingText(prereq) {
  if (!prereq) return '';
  var parts = [];
  if (prereq.buildings) {
    for (var bId in prereq.buildings) {
      var bld = DEF.buildingDefs[bId];
      var need = prereq.buildings[bId];
      var have = countBuildings(bId);
      if (have < need) parts.push('需' + bld.name + '×' + need + '(现有' + have + ')');
    }
  }
  return parts.join('；');
}

// 规则校验返回 null（通过）或 failText 字符串（失败）
var RULES = {
  canBuild: function(bldId, row, col) {
    var bld = DEF.buildingDefs[bldId];
    if (!bld) return '未知建筑类型';
    if (state.grid[row][col] !== null) return '此格已有建筑';
    if (!canAfford(bld.cost)) return '资源不足';
    if (bld.limits) {
      if (bld.limits.perFloor && countOnFloor(bldId, row) >= bld.limits.perFloor)
        return '此层' + bld.name + '已达上限(' + bld.limits.perFloor + '座)';
      if (bld.limits.total && countBuildings(bldId) >= bld.limits.total)
        return bld.name + '全局上限已满(' + bld.limits.total + '座)';
    }
    if (bld.prerequisites && !checkPrerequisites(bld.prerequisites))
      return prereqMissingText(bld.prerequisites);
    return null; // 通过
  },
  canWork: function(row, col) {
    var bldId = state.grid[row][col];
    if (!bldId) return '此格无建筑';
    var bld = DEF.buildingDefs[bldId];
    if (!bld || !bld.work) return bld ? (bld.name + '无主动工作') : '未知建筑';
    if (bld.work.trade) return null; // 交易另有校验
    if (!canAfford(bld.work.cost)) return '劳动力不足';
    return null;
  },
  canDemolish: function(row, col) {
    if (!state.grid[row][col]) return '此格无建筑可拆';
    return null;
  },
  canRest: function(row, col) {
    if (state.grid[row][col] !== 'housing') return '仅住宅可休息';
    return null;
  }
};

function showFailure(msg) {
  var el = document.getElementById('failure-msg');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.style.display = 'block';
  el.style.opacity = '1';
  el.style.left = '50%';
  el.style.top = '58%';
  setTimeout(function(){ el.style.opacity = '0'; setTimeout(function(){ el.style.display = 'none'; }, 800); }, 1200);
}

// ═════════════════════════════════════════════════════════════
//  法五：修饰符 — 叠算倍率，范畴驱动
// ═════════════════════════════════════════════════════════════

var modifiers = {
  global: { laborMult:0, foodMult:0, woodMult:0, stoneMult:0 },
  // perCategory 动态计算（不存储，每次查询时遍历建筑）
};

// 获取某资源总倍率（全局 + 范畴）
function getResourceMult(resType, bldId) {
  var bld = DEF.buildingDefs[bldId];
  var mult = 1 + (modifiers.global[resType + 'Mult'] || 0);
  // 范畴加成：每有一座同范畴建筑，产出 +2%（体现集群效应 — 但也因此消耗更多劳动力）
  if (bld && bld.category) {
    var ancestors = categoryAncestors(bld.category);
    var catBonus = 0;
    for (var r = 0; r < DEF.grid.rows; r++) {
      for (var c = 0; c < DEF.grid.cols; c++) {
        var ob = state.grid[r][c];
        if (!ob) continue;
        var obDef = DEF.buildingDefs[ob];
        if (obDef && obDef.category) {
          var obAnc = categoryAncestors(obDef.category);
          for (var ai = 0; ai < ancestors.length; ai++) {
            if (obAnc.indexOf(ancestors[ai]) >= 0) { catBonus += 0.02; break; }
          }
        }
      }
    }
    mult += catBonus;
  }
  return mult;
}

// 获取建筑之有效产出（考虑范畴倍率）
function getEffectiveProduce(bldId) {
  var bld = DEF.buildingDefs[bldId];
  if (!bld || !bld.work || bld.work.trade) return null;
  var prod = {};
  for (var k in bld.work.produce) {
    var mult = getResourceMult(k, bldId);
    prod[k] = Math.max(1, Math.floor(bld.work.produce[k] * mult));
  }
  return prod;
}

// 更新全局修饰符（随游戏进程动态变化）
function updateGlobalModifiers() {
  var totalBld = 0;
  for (var r = 0; r < DEF.grid.rows; r++)
    for (var c = 0; c < DEF.grid.cols; c++)
      if (state.grid[r][c]) totalBld++;
  // 规模效应：建筑越多，维护负担越重
  modifiers.global.laborMult = 0;
  modifiers.global.foodMult = totalBld >= 8 ? 0.05 : 0;
  modifiers.global.woodMult = totalBld >= 10 ? 0.05 : 0;
  modifiers.global.stoneMult = totalBld >= 10 ? 0.05 : 0;
}

// ═════════════════════════════════════════════════════════════
//  法六：生命周期钩子 — 建造/拆除皆有回响
// ═════════════════════════════════════════════════════════════

function fireOnBuilt(bldId, row, col) {
  var bld = DEF.buildingDefs[bldId];
  if (bld && typeof bld.onBuilt === 'function') bld.onBuilt(row, col);
  Events.emit('building:built', { id:bldId, row:row, col:col });
}

function fireOnDestroy(bldId, row, col) {
  var bld = DEF.buildingDefs[bldId];
  if (bld && typeof bld.onDestroy === 'function') bld.onDestroy(row, col);
  Events.emit('building:destroyed', { id:bldId, row:row, col:col });
}

// ═════════════════════════════════════════════════════════════
//  法七：事件总线（保留并增强）
// ═════════════════════════════════════════════════════════════

var Events = { _ls:{} };
Events.on = function(evt, fn) { (this._ls[evt]=this._ls[evt]||[]).push(fn); };
Events.emit = function(evt, data) { (this._ls[evt]||[]).forEach(function(f){ f(data); }); };

// 监听范畴加成变化，自动更新 UI
Events.on('building:built', function(){ updateGlobalModifiers(); });
Events.on('building:destroyed', function(){ updateGlobalModifiers(); });

// ═════════════════════════════════════════════════════════════
//  状态层
// ═════════════════════════════════════════════════════════════

var state = {
  grid: [],
  res: { labor:0, food:0, wood:0, stone:0 },
  selectedCell: null,
  hoveredCell: null,
  hoveredFurniture: null,
  tickCount: 0,
  logMessages: [],
  elevatorTarget: 0,
  elevatorPos: 0,
  workerStates: {},  // "row,col" → { anim:'idle'|'working', until:ts }
};

function initState() {
  state.grid = Array.from({ length: DEF.grid.rows }, function(){ return Array(DEF.grid.cols).fill(null); });
  var s = DEF.economy.startResources;
  state.res = { labor:s.labor, food:s.food, wood:s.wood, stone:s.stone };
  state.selectedCell = null;
  state.hoveredCell = null;
  state.hoveredFurniture = null;
  state.tickCount = 0;
  state.logMessages = [];
  state.elevatorTarget = 0;
  state.elevatorPos = 0;
  state.workerStates = {};
  updateGlobalModifiers();
}

function saveGame() {
  try {
    localStorage.setItem(DEF.save.key, JSON.stringify({
      grid: state.grid, res: state.res, tickCount: state.tickCount, ts: Date.now()
    }));
  } catch(e) {}
}

function loadGame() {
  try {
    var raw = localStorage.getItem(DEF.save.key);
    if (!raw) return false;
    var data = JSON.parse(raw);
    state.grid = data.grid;
    state.res = data.res;
    state.tickCount = data.tickCount || 0;
    updateGlobalModifiers();
    return true;
  } catch(e) { return false; }
}

function clearSave() {
  try { localStorage.removeItem(DEF.save.key); } catch(e) {}
}

// ═════════════════════════════════════════════════════════════
//  Canvas / 辅助
// ═════════════════════════════════════════════════════════════

var canvas = document.getElementById('game-canvas');
var ctx = canvas.getContext('2d');
var W = LAY.canvas.w, H = LAY.canvas.h;
var GX = LAY.grid.x, GY = LAY.grid.y;
var CW = LAY.grid.cellW, CH = LAY.grid.cellH;
var BH = LAY.beams.h, BV = LAY.beams.v;
var GW = DEF.grid.cols * CW, GH = DEF.grid.rows * CH;

function addRes(k, a) { state.res[k] = Math.max(0, (state.res[k]||0) + a); }
function canAfford(costs) { for (var k in costs) { if ((state.res[k]||0) < costs[k]) return false; } return true; }
function payCost(costs) { for (var k in costs) state.res[k] -= costs[k]; }
function hexA(h, a) { var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return 'rgba('+r+','+g+','+b+','+a+')'; }
function bldById(id) { return DEF.buildingDefs[id] || null; }

function log(msg) {
  state.logMessages.unshift(msg);
  if (state.logMessages.length > 5) state.logMessages.pop();
  document.getElementById('log').innerHTML = state.logMessages.join('<br>');
}

// ═════════════════════════════════════════════════════════════
//  渲染层 — 背景
// ═════════════════════════════════════════════════════════════

var P = {
  earth_top:'#1a1410', earth_mid:'#14100c', earth_deep:'#0e0a08',
  rock_vein:'#1e1a14', ore_glimmer:'#797962',
  concrete:'#2a2822', concrete_dark:'#1e1c18',
  steel:'#3a3832', steel_dark:'#282620',
  beam_h:'#2a2822', beam_v:'#24221e',
  grid_bg:'#0e0e0c',
  highlight:'#797962', highlight2:'#9f9f9f',
  accent_warm:'#535624', shadow:'#0a0806',
  worker_body:'#8a8a7a', worker_head:'#c8c4b0',
  bed_frame:'#3a3028', bed_sheet:'#4a3a2a',
  plant_green:'#3a5a1a', shelf_brown:'#3a2a18',
  log_bark:'#8a6a3a', log_inner:'#a08050',
  ore_gray:'#6a6a6a', cart_brown:'#4a3020',
  counter_brown:'#4a3a28', goods_red:'#cc6644',
  elevator_car:'#3a3830', elevator_cable:'#5a5850',
};

function drawUnderground() {
  var grad = ctx.createLinearGradient(0, 0, 0, LAY.ground.y + 80);
  grad.addColorStop(0, P.earth_top);
  grad.addColorStop(0.15, P.earth_top);
  grad.addColorStop(0.4, P.earth_mid);
  grad.addColorStop(0.7, P.earth_deep);
  grad.addColorStop(1, '#060608');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  for (var i = 0; i < 45; i++) {
    var vx = (i * 193 + 77) % W;
    var vy = 40 + (i * 251 + 131) % (LAY.ground.y - 100);
    ctx.fillStyle = hexA(P.rock_vein, 0.15 + (i % 5) * 0.08);
    ctx.fillRect(vx, vy, 14 + (i % 20) * 2.5, 2 + (i % 6) * 1.5);
  }
  for (var j = 0; j < 30; j++) {
    var ox = (j * 317 + 53) % W;
    var oy = 60 + (j * 197 + 89) % (LAY.ground.y - 80);
    ctx.fillStyle = hexA(P.ore_glimmer, 0.25 + (j % 4) * 0.12);
    ctx.beginPath();
    ctx.arc(ox, oy, 0.6 + (j % 7) * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGround() {
  var grad = ctx.createLinearGradient(0, LAY.ground.y, 0, H);
  grad.addColorStop(0, P.concrete_dark);
  grad.addColorStop(0.06, P.shadow);
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, LAY.ground.y, W, H - LAY.ground.y);
  ctx.strokeStyle = P.concrete;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, LAY.ground.y);
  ctx.lineTo(W, LAY.ground.y);
  ctx.stroke();

  var fogGrad = ctx.createLinearGradient(0, LAY.ground.y - 120, 0, H);
  fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
  fogGrad.addColorStop(0.35, hexA(P.earth_deep, 0.15));
  fogGrad.addColorStop(0.7, hexA(P.shadow, 0.5));
  fogGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, 0, W, H);
}

// ═════════════════════════════════════════════════════════════
//  渲染 — 结构框架（厚梁柱 + 电梯井）
// ═════════════════════════════════════════════════════════════

function drawStructure() {
  var fx = GX - BV, fy = GY - BH;
  var fw = GW + BV * 2, fh = GH + BH * 2;

  // 砼框架
  ctx.fillStyle = P.concrete;
  ctx.fillRect(fx, fy, fw, BH);
  ctx.fillRect(fx, fy + fh - BH, fw, BH);
  ctx.fillRect(fx, fy, BV, fh);
  ctx.fillRect(fx + fw - BV, fy, BV, fh);

  // 砼纹理
  ctx.strokeStyle = hexA(P.concrete_dark, 0.3);
  ctx.lineWidth = 0.5;
  for (var i = 0; i < fw; i += 12) {
    ctx.beginPath(); ctx.moveTo(fx + i, fy); ctx.lineTo(fx + i, fy + BH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx + i, fy + fh - BH); ctx.lineTo(fx + i, fy + fh); ctx.stroke();
  }

  // 横梁
  ctx.fillStyle = P.beam_h;
  for (var row = 0; row <= DEF.grid.rows; row++) {
    var ly = GY + row * CH - BH / 2;
    ctx.fillRect(GX, ly, GW, BH);
  }

  // 竖柱
  ctx.fillStyle = P.beam_v;
  for (var col = 0; col <= DEF.grid.cols; col++) {
    var lx = GX + col * CW - BV / 2;
    ctx.fillRect(lx, GY, BV, GH);
  }

  // 铆钉
  ctx.fillStyle = P.steel;
  for (var rr = 0; rr <= DEF.grid.rows; rr++) {
    for (var cc = 0; cc <= DEF.grid.cols; cc++) {
      var rx = GX + cc * CW - 3, ry = GY + rr * CH - 3;
      ctx.fillRect(rx, ry, 6, 6);
      ctx.fillStyle = hexA('#5a5850', 0.5);
      ctx.fillRect(rx + 1, ry + 1, 2, 2);
      ctx.fillStyle = P.steel;
    }
  }

  // 楼层编号
  ctx.save();
  ctx.fillStyle = P.highlight;
  ctx.font = '10px "Microsoft YaHei"';
  ctx.textAlign = 'right';
  for (var fr = 0; fr < DEF.grid.rows; fr++) {
    ctx.fillText((DEF.grid.rows - fr) + 'F', GX - BV - 8, GY + fr * CH + CH / 2 + 3);
  }
  ctx.restore();

  // 标注
  ctx.fillStyle = P.highlight;
  ctx.font = '11px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('垂直纪元·建筑剖面', GX + GW / 2, GY + GH + BH + 14);
}

function drawElevator() {
  var ex = LAY.elevator.x, ey = LAY.elevator.trackTop;
  var eh = LAY.elevator.trackH;

  ctx.fillStyle = '#0c0c0a';
  ctx.fillRect(ex, ey, LAY.elevator.w, eh);
  ctx.strokeStyle = P.steel_dark;
  ctx.lineWidth = 2;
  ctx.strokeRect(ex, ey, LAY.elevator.w, eh);

  ctx.strokeStyle = P.steel;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ex + 7, ey); ctx.lineTo(ex + 7, ey + eh);
  ctx.moveTo(ex + LAY.elevator.w - 7, ey); ctx.lineTo(ex + LAY.elevator.w - 7, ey + eh);
  ctx.stroke();

  ctx.strokeStyle = P.elevator_cable;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(ex + LAY.elevator.w / 2, ey);
  ctx.lineTo(ex + LAY.elevator.w / 2, ey + eh);
  ctx.stroke();

  // 轿厢平滑过渡
  var targetY = GY + (DEF.grid.rows - 1 - state.elevatorTarget) * CH + CH / 2 - 16;
  var diff = targetY - state.elevatorPos;
  state.elevatorPos += diff * 0.25;
  if (Math.abs(diff) < 0.5) state.elevatorPos = targetY;

  var cy = state.elevatorPos;
  var cx = ex + LAY.elevator.xInner;
  var cw = LAY.elevator.w - 8;
  var ch = 20;

  ctx.fillStyle = P.elevator_car;
  ctx.fillRect(cx, cy, cw, ch);
  ctx.strokeStyle = P.steel;
  ctx.lineWidth = 1;
  ctx.strokeRect(cx, cy, cw, ch);
  ctx.strokeStyle = P.steel_dark;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(cx + cw / 2, cy + 2);
  ctx.lineTo(cx + cw / 2, cy + ch - 2);
  ctx.stroke();

  ctx.fillStyle = P.highlight;
  ctx.font = '8px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('升', ex + LAY.elevator.w / 2, ey - 6);
  ctx.fillText('降', ex + LAY.elevator.w / 2, ey + eh + 11);
}

// ═════════════════════════════════════════════════════════════
//  渲染 — 房间内饰
// ═════════════════════════════════════════════════════════════

function drawCell(row, col) {
  var x = GX + col * CW, y = GY + row * CH;
  var bldId = state.grid[row][col];
  var bld = bldId ? bldById(bldId) : null;

  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 2, y + 2, CW - 4, CH - 4);
  ctx.clip();

  ctx.fillStyle = bld ? bld.roomColor : '#0c0c0a';
  ctx.fillRect(x, y, CW, CH);

  if (bld) {
    drawRoomInterior(bld, x, y, CW, CH, row, col);
  } else {
    ctx.fillStyle = hexA('#1a1814', 0.2);
    ctx.fillRect(x + CW * 0.25, y + CH * 0.45, CW * 0.5, CH * 0.12);
  }

  ctx.restore();
}

function drawRoomInterior(bld, x, y, w, h, row, col) {
  var cx = x + w / 2, cy = y + h / 2;

  switch (bld.id) {
    case 'housing': {
      var hg = ctx.createRadialGradient(cx + 14, cy - 4, w * 0.06, cx + 14, cy - 4, w * 0.45);
      hg.addColorStop(0, hexA(bld.accent, 0.3));
      hg.addColorStop(1, hexA(bld.accent, 0));
      ctx.fillStyle = hg;
      ctx.fillRect(x, y, w, h);

      var bx = x + 8, by = y + 22;
      ctx.fillStyle = P.bed_frame;
      ctx.fillRect(bx, by, 42, 28);
      ctx.fillStyle = P.bed_sheet;
      ctx.fillRect(bx + 2, by + 3, 38, 10);
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(bx + 2, by - 6, 38, 8);
      ctx.fillStyle = P.bed_frame;
      ctx.fillRect(bx, by - 10, 3, 38);
      ctx.fillRect(bx + 39, by - 10, 3, 38);
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(bx + 28, by + 4, 10, 7);
      ctx.fillRect(bx + 28, by - 5, 10, 6);

      ctx.fillStyle = '#3a2a18';
      ctx.fillRect(x + 56, y + 36, 22, 3);
      ctx.fillRect(x + 58, y + 39, 3, 10);
      ctx.fillRect(x + 73, y + 39, 3, 10);

      ctx.fillStyle = hexA('#c8c8a0', 0.2);
      ctx.fillRect(x + 82, y + 8, 14, 16);
      ctx.strokeStyle = '#404040';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(x + 82, y + 8, 14, 16);
      ctx.beginPath();
      ctx.moveTo(x + 89, y + 8); ctx.lineTo(x + 89, y + 24);
      ctx.moveTo(x + 82, y + 16); ctx.lineTo(x + 96, y + 16);
      ctx.stroke();

      ctx.fillStyle = hexA(bld.accent, 0.6);
      ctx.beginPath();
      ctx.arc(x + 64, y + 30, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5a5850';
      ctx.fillRect(x + 63, y + 34, 2, 6);

      drawWorkers(x, y, w, h, row, col, 1);
      break;
    }
    case 'farm': {
      var fg = ctx.createRadialGradient(cx, cy - 12, w * 0.08, cx, cy - 12, w * 0.5);
      fg.addColorStop(0, hexA('#4a6a2a', 0.25));
      fg.addColorStop(1, hexA('#4a6a2a', 0));
      ctx.fillStyle = fg;
      ctx.fillRect(x, y, w, h);

      for (var s = 0; s < 3; s++) {
        var sx = x + 10 + s * 32, sy = y + 14;
        ctx.fillStyle = P.shelf_brown;
        ctx.fillRect(sx, sy, 26, 30);
        ctx.fillStyle = '#2a1a0a';
        for (var sl = 0; sl < 3; sl++) {
          var sly = sy + 4 + sl * 9;
          ctx.fillRect(sx + 2, sly, 22, 2);
          ctx.fillStyle = P.plant_green;
          for (var p = 0; p < 3; p++) {
            var px = sx + 6 + p * 7;
            ctx.fillRect(px, sly - 4 - (p % 2) * 2, 2.5, 4 + (p % 2) * 2);
          }
          ctx.fillStyle = '#2a1a0a';
        }
      }

      ctx.strokeStyle = '#5a5850';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + w - 4, y + 10);
      ctx.lineTo(x + w - 4, y + h - 6);
      ctx.stroke();
      ctx.fillStyle = '#888';
      ctx.fillRect(x + w - 7, y + 28, 6, 6);

      drawWorkers(x, y, w, h, row, col, 1);
      break;
    }
    case 'lumber': {
      var logColors = [P.log_bark, '#7a5a2a', P.log_bark, '#9a7a4a'];
      for (var li = 0; li < 4; li++) {
        ctx.fillStyle = logColors[li];
        ctx.fillRect(x + 8 + li * 15, cy + 2 - li * 2, 17, 9);
        ctx.strokeStyle = '#4a3010';
        ctx.lineWidth = 0.4;
        ctx.strokeRect(x + 8 + li * 15, cy + 2 - li * 2, 17, 9);
        ctx.fillStyle = hexA(logColors[li], 0.5);
        ctx.fillRect(x + 12 + li * 15, cy + 4 - li * 2, 3, 3);
      }

      ctx.fillStyle = '#4a3828';
      ctx.fillRect(x + 58, cy + 6, 28, 16);
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(x + 72, cy - 2, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.arc(x + 72, cy - 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#777';
      ctx.lineWidth = 0.5;
      for (var ti = 0; ti < 8; ti++) {
        var ta = ti * Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(x + 72 + Math.cos(ta) * 7, cy - 2 + Math.sin(ta) * 7);
        ctx.lineTo(x + 72 + Math.cos(ta) * 9, cy - 2 + Math.sin(ta) * 9);
        ctx.stroke();
      }

      ctx.fillStyle = '#6a5a3a';
      ctx.fillRect(x + 82, y + h - 14, 14, 8);
      ctx.fillStyle = '#7a6a4a';
      ctx.fillRect(x + 84, y + h - 16, 4, 4);

      drawWorkers(x, y, w, h, row, col, 1);
      break;
    }
    case 'mine': {
      ctx.fillStyle = '#1e1e1e';
      for (var ri = 0; ri < 7; ri++) {
        var rrx = x + w - 38 + ri * 5;
        var rry = y + 2 + (ri % 2) * 7;
        ctx.fillRect(rrx, rry, 6, h * 0.45);
      }

      ctx.fillStyle = '#080808';
      ctx.beginPath();
      ctx.arc(cx - 6, cy + 1, 12, Math.PI, 0);
      ctx.fill();

      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + 4, cy + 11);
      ctx.lineTo(cx - 6, cy + 8);
      ctx.lineTo(x + w - 6, cy + 11);
      ctx.stroke();
      ctx.fillStyle = P.cart_brown;
      for (var ti2 = 0; ti2 < 5; ti2++) {
        ctx.fillRect(x + 8 + ti2 * 16, cy + 10, 6, 3);
      }

      ctx.fillStyle = P.ore_gray;
      ctx.fillRect(x + 12, cy + 4, 22, 10);
      ctx.fillStyle = '#888';
      ctx.fillRect(x + 13, cy + 5, 20, 3);
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.arc(x + 18, cy + 14, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 28, cy + 14, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = hexA(P.ore_glimmer, 0.5);
      ctx.beginPath(); ctx.arc(x + w - 14, y + 16, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w - 20, y + 28, 1.8, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(x + 54, y + 38, 14, 2.5);
      ctx.fillStyle = '#888';
      ctx.fillRect(x + 50, y + 36, 6, 7);

      drawWorkers(x, y, w, h, row, col, 1);
      break;
    }
    case 'market': {
      var mg = ctx.createRadialGradient(cx, cy - 4, w * 0.1, cx, cy - 4, w * 0.5);
      mg.addColorStop(0, hexA(P.accent_warm, 0.28));
      mg.addColorStop(1, hexA(P.accent_warm, 0));
      ctx.fillStyle = mg;
      ctx.fillRect(x, y, w, h);

      ctx.fillStyle = P.counter_brown;
      ctx.fillRect(x + 12, cy + 6, 50, 16);
      ctx.fillStyle = '#5a4a38';
      ctx.fillRect(x + 12, cy + 6, 50, 3);
      ctx.fillStyle = '#cc6644';
      ctx.beginPath(); ctx.arc(cx - 8, cy, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ddcc44';
      ctx.beginPath(); ctx.arc(cx, cy + 1, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#66aa44';
      ctx.beginPath(); ctx.arc(cx + 8, cy, 3, 0, Math.PI * 2); ctx.fill();

      for (var sh = 0; sh < 2; sh++) {
        var shx = x + 62 + sh * 18;
        ctx.fillStyle = P.shelf_brown;
        ctx.fillRect(shx, y + 14, 14, 28);
        ctx.fillStyle = '#5a4a38';
        ctx.fillRect(shx + 1, y + 18, 12, 2);
        ctx.fillRect(shx + 1, y + 24, 12, 2);
        ctx.fillRect(shx + 1, y + 30, 12, 2);
      }

      ctx.fillStyle = hexA(P.highlight, 0.45);
      ctx.fillRect(cx - 16, y + 4, 32, 9);
      ctx.fillStyle = '#c8c8a0';
      ctx.font = '7px "Microsoft YaHei"';
      ctx.textAlign = 'center';
      ctx.fillText('交易', cx, y + 11);

      drawWorkers(x, y, w, h, row, col, 0);
      break;
    }
  }

  // 范畴标注
  if (bld.category && ECO[bld.category]) {
    ctx.fillStyle = hexA('#797962', 0.3);
    ctx.font = '7px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(ECO[bld.category].desc, x + w - 4, y + 8);
  }

  // 产出倍率（若有）
  if (bld.work && !bld.work.trade && bld.work.produce) {
    var pk = Object.keys(bld.work.produce)[0];
    var mult = getResourceMult(pk, bld.id);
    if (mult > 1) {
      ctx.fillStyle = hexA('#c8c8a0', 0.5);
      ctx.font = '7px "Microsoft YaHei"';
      ctx.textAlign = 'right';
      ctx.fillText('×' + mult.toFixed(1), x + w - 4, y + 16);
    }
  }

  ctx.fillStyle = hexA('#797962', 0.4);
  ctx.font = '8px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText(bld.name, cx, y + h - 3);
}

// ── 工人 ──
function drawWorkers(x, y, w, h, row, col, count) {
  if (count <= 0) return;
  var key = row + ',' + col;
  var ws = state.workerStates[key] || { anim:'idle', until:0 };
  if (Date.now() > ws.until) ws.anim = 'idle';

  for (var i = 0; i < count; i++) {
    var wx = x + 54 + i * 16, wy = y + h - 18;
    ctx.fillStyle = P.worker_body;
    ctx.fillRect(wx + 2, wy + 4, 5, 7);
    ctx.fillStyle = P.worker_head;
    ctx.beginPath();
    ctx.arc(wx + 4.5, wy + 2, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = P.worker_body;
    ctx.lineWidth = 1;
    if (ws.anim === 'working') {
      ctx.beginPath();
      ctx.moveTo(wx + 3, wy + 11); ctx.lineTo(wx + 1, wy + 15);
      ctx.moveTo(wx + 6, wy + 11); ctx.lineTo(wx + 8, wy + 15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + 2, wy + 6); ctx.lineTo(wx - 3, wy + 4);
      ctx.moveTo(wx + 7, wy + 6); ctx.lineTo(wx + 12, wy + 4);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(wx + 3, wy + 11); ctx.lineTo(wx + 2, wy + 15);
      ctx.moveTo(wx + 6, wy + 11); ctx.lineTo(wx + 7, wy + 15);
      ctx.stroke();
    }
  }
}

// ── 交互命中检测 ──
function getFurnitureAt(row, col, mx, my) {
  var bldId = state.grid[row][col];
  if (!bldId) return null;
  var bld = bldById(bldId);
  var furn = LAY.furniture[bld.id] || [];
  var cx = GX + col * CW, cy = GY + row * CH;
  for (var i = 0; i < furn.length; i++) {
    var f = furn[i];
    if (mx >= cx + f.x && mx <= cx + f.x + f.w && my >= cy + f.y && my <= cy + f.y + f.h) {
      return { furniture:f, index:i, bld:bld, row:row, col:col };
    }
  }
  return null;
}

function getCellAt(mx, my) {
  var col = Math.floor((mx - GX) / CW);
  var row = Math.floor((my - GY) / CH);
  if (col < 0 || col >= DEF.grid.cols || row < 0 || row >= DEF.grid.rows) return null;
  return { row:row, col:col };
}

function updateElevatorTarget() {
  if (state.selectedCell) state.elevatorTarget = state.selectedCell.row;
}

// ── 高亮 ──
function drawSelectionHighlight() {
  if (!state.selectedCell) return;
  var x = GX + state.selectedCell.col * CW, y = GY + state.selectedCell.row * CH;
  ctx.save();
  ctx.strokeStyle = P.accent_warm;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = P.accent_warm;
  ctx.shadowBlur = 10;
  ctx.strokeRect(x + 2, y + 2, CW - 4, CH - 4);
  ctx.restore();
}

function drawHoverHighlight() {
  if (!state.hoveredFurniture) return;
  var f = state.hoveredFurniture;
  var x = GX + f.col * CW + f.furniture.x, y = GY + f.row * CH + f.furniture.y;
  ctx.save();
  ctx.strokeStyle = '#c8c8a0';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 2]);
  ctx.strokeRect(x, y, f.furniture.w, f.furniture.h);
  ctx.setLineDash([]);
  ctx.restore();
}

// ── 主渲染 ──
function render() {
  ctx.clearRect(0, 0, W, H);
  drawUnderground();

  var fx = GX - BV, fy = GY - BH;
  ctx.fillStyle = hexA(P.grid_bg, 0.5);
  ctx.fillRect(fx + BV, fy + BH, GW, GH);

  for (var row = 0; row < DEF.grid.rows; row++)
    for (var col = 0; col < DEF.grid.cols; col++)
      drawCell(row, col);

  drawStructure();
  drawElevator();
  drawSelectionHighlight();
  drawHoverHighlight();
  drawGround();
}

// ═════════════════════════════════════════════════════════════
//  交互层 — 规则校验驱动
// ═════════════════════════════════════════════════════════════

function handleClick(mx, my) {
  // 先检器物
  var cell = getCellAt(mx, my);
  if (cell) {
    var hit = getFurnitureAt(cell.row, cell.col, mx, my);
    if (hit) {
      if (hit.furniture.action === 'work') {
        var fail = RULES.canWork(cell.row, cell.col);
        if (fail) { showFailure(fail); return; }
        doWorkAt(cell.row, cell.col);
        return;
      } else if (hit.furniture.action === 'rest') {
        var rf = RULES.canRest(cell.row, cell.col);
        if (rf) { showFailure(rf); return; }
        doRestAt(cell.row, cell.col);
        return;
      } else if (hit.furniture.action === 'info') {
        log('\u{1F4AC} ' + hit.bld.name + ' — ' + hit.furniture.n);
        return;
      }
    }
  }

  // 格子级
  if (!cell) { state.selectedCell = null; updateElevatorTarget(); updateInfoPanel(); render(); return; }

  if (state.selectedCell && state.selectedCell.row === cell.row && state.selectedCell.col === cell.col) {
    state.selectedCell = null;
  } else {
    state.selectedCell = cell;
    updateElevatorTarget();
  }
  updateInfoPanel();
  render();
}

function handleHover(mx, my) {
  state.hoveredCell = null;
  state.hoveredFurniture = null;
  var cell = getCellAt(mx, my);
  if (!cell) { canvas.style.cursor = 'default'; updateTooltip(null); render(); return; }

  var hit = getFurnitureAt(cell.row, cell.col, mx, my);
  if (hit) {
    state.hoveredCell = cell;
    state.hoveredFurniture = hit;
    canvas.style.cursor = 'pointer';
    updateTooltip(hit);
  } else {
    state.hoveredCell = cell;
    canvas.style.cursor = state.grid[cell.row][cell.col] ? 'pointer' : 'crosshair';
    updateTooltip(null);
  }
  render();
}

// ── Tooltip ──
var tooltipEl = document.getElementById('tooltip');
function updateTooltip(hit) {
  if (!hit) { tooltipEl.style.display = 'none'; return; }
  var bld = hit.bld, f = hit.furniture;
  var h = '';
  if (f.action === 'work') h = ' [点击工作]';
  else if (f.action === 'rest') h = ' [点击休息 +' + DEF.economy.restLaborGain + '劳力]';
  else if (f.action === 'info') h = ' [点击查看]';
  tooltipEl.textContent = bld.name + ' · ' + f.n + h;
  tooltipEl.style.display = 'block';
}

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = W / rect.width, sy = H / rect.height;
  handleHover((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
  tooltipEl.style.left = (e.clientX + 16) + 'px';
  tooltipEl.style.top = (e.clientY - 28) + 'px';
});

canvas.addEventListener('mouseleave', function() {
  state.hoveredCell = null;
  state.hoveredFurniture = null;
  updateTooltip(null);
  render();
});

canvas.addEventListener('click', function(e) {
  var rect = canvas.getBoundingClientRect();
  var sx = W / rect.width, sy = H / rect.height;
  handleClick((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
});

// ═════════════════════════════════════════════════════════════
//  游戏逻辑 — 含规则校验 + 范畴倍率
// ═════════════════════════════════════════════════════════════

function doBuild(bldId) {
  var sel = state.selectedCell;
  if (!sel) return;
  var fail = RULES.canBuild(bldId, sel.row, sel.col);
  if (fail) { showFailure(fail); return; }
  var bld = bldById(bldId);
  payCost(bld.cost);
  state.grid[sel.row][sel.col] = bldId;
  log('建造了 ' + bld.name + '（' + (DEF.grid.rows - sel.row) + 'F）');
  fireOnBuilt(bldId, sel.row, sel.col);
  updateResourceDisplay();
  updateInfoPanel();
  render();
  saveGame();
}

function doWorkAt(row, col) {
  var bldId = state.grid[row][col];
  if (!bldId) return;
  var bld = bldById(bldId);
  if (!bld || !bld.work) return;

  if (bld.work.trade) {
    if (!canAfford(bld.work.cost)) { showFailure('劳动力不足，无法交易'); return; }
    payCost(bld.work.cost);
    addRes('food', 3);
    log('在市场交易：消耗2劳力 → +3食物');
    updateResourceDisplay(); updateInfoPanel(); render(); saveGame();
    return;
  }

  var fail = RULES.canWork(row, col);
  if (fail) { showFailure(fail); return; }
  payCost(bld.work.cost);
  var eff = getEffectiveProduce(bldId);
  for (var k in eff) addRes(k, eff[k]);

  var key = row + ',' + col;
  state.workerStates[key] = { anim:'working', until:Date.now() + DEF.workers.animDuration };

  var prodStr = '';
  for (var k2 in eff) prodStr += '+' + eff[k2] + ({ labor:'劳力',food:'食物',wood:'木材',stone:'石材' }[k2]||k2) + ' ';
  var multStr = '';
  for (var k3 in eff) {
    var m = getResourceMult(k3, bldId);
    if (m > 1) multStr = ' (范畴加成×' + m.toFixed(2) + ')';
  }
  log('在 ' + bld.name + ' 劳动 — ' + prodStr + multStr);
  Events.emit('work', { row:row, col:col, bld:bld });
  updateResourceDisplay();
  updateInfoPanel();
  render();
  saveGame();
}

function doRestAt(row, col) {
  addRes('labor', DEF.economy.restLaborGain);
  log('在住宅休息，恢复' + DEF.economy.restLaborGain + '点劳动力');
  updateResourceDisplay(); updateInfoPanel(); render(); saveGame();
}

function doWork() {
  if (!state.selectedCell) return;
  doWorkAt(state.selectedCell.row, state.selectedCell.col);
}

function marketTrade(resType) {
  if (!state.selectedCell) return;
  if (state.grid[state.selectedCell.row][state.selectedCell.col] !== 'market') return;
  if (!canAfford({ labor:2 })) { showFailure('劳动力不足，无法交易'); return; }
  payCost({ labor:2 });
  addRes(resType, 3);
  var rn = { food:'食物', wood:'木材', stone:'石材' }[resType];
  log('市场交易：消耗2劳力 → +3' + rn);
  updateResourceDisplay(); updateInfoPanel(); render(); saveGame();
}

function demolishBuilding() {
  var sel = state.selectedCell;
  if (!sel) return;
  if (!state.grid[sel.row][sel.col]) return;
  var bldId = state.grid[sel.row][sel.col];
  var bld = bldById(bldId);
  if (bld.cost.wood) addRes('wood', Math.floor(bld.cost.wood * DEF.economy.demolishRefundRatio));
  if (bld.cost.stone) addRes('stone', Math.floor(bld.cost.stone * DEF.economy.demolishRefundRatio));
  state.grid[sel.row][sel.col] = null;
  fireOnDestroy(bldId, sel.row, sel.col);
  log('拆除了 ' + bld.name);
  updateResourceDisplay(); updateInfoPanel(); render(); saveGame();
}

// ── 世界 tick ──
function gameTick() {
  state.tickCount++;
  var laborDelta = 0, foodDelta = 0;
  var housingCount = 0, otherCount = 0;

  for (var row = 0; row < DEF.grid.rows; row++) {
    for (var col = 0; col < DEF.grid.cols; col++) {
      var bldId = state.grid[row][col];
      if (!bldId) continue;
      var bld = bldById(bldId);
      if (bld.passive) { laborDelta += bld.passive.labor||0; foodDelta += bld.passive.food||0; housingCount++; }
      else { otherCount++; }
    }
  }

  laborDelta -= Math.floor(otherCount * DEF.economy.maintLaborPerBuilding);
  laborDelta -= DEF.economy.baseLaborDecay;
  addRes('labor', laborDelta);
  addRes('food', foodDelta);

  updateResourceDisplay();

  if (state.res.labor <= 0) log('劳动力耗尽！建造更多住宅以恢复。');
  if (state.res.food <= 0 && housingCount > 0) log('食物耗尽！住宅无法再生产劳动力。');

  render();
  saveGame();
}

// ── UI 更新 ──
function updateResourceDisplay() {
  document.getElementById('val-labor').textContent = Math.floor(state.res.labor);
  document.getElementById('val-food').textContent  = Math.floor(state.res.food);
  document.getElementById('val-wood').textContent  = Math.floor(state.res.wood);
  document.getElementById('val-stone').textContent = Math.floor(state.res.stone);
}

function updateInfoPanel() {
  var panel = document.getElementById('info-panel');
  var sel = state.selectedCell;
  if (!sel) { panel.innerHTML = '<span class="msg">点击空地块建造 &nbsp;|&nbsp; 点击建筑劳动 &nbsp;|&nbsp; 点击器物直接交互</span>'; return; }

  var row = sel.row, col = sel.col;
  var bldId = state.grid[row][col];
  var floor = DEF.grid.rows - row;

  if (bldId) {
    var bld = bldById(bldId);
    var html = '<span class="msg">' + bld.icon + ' <b>' + bld.name + '</b> ' + floor + 'F · ' + (ECO[bld.category] ? ECO[bld.category].desc : '') + '</span>';
    if (bld.work) {
      if (bld.work.trade) {
        html += '<button class="btn" onclick="marketTrade(\'food\')">换食物</button>';
        html += '<button class="btn" onclick="marketTrade(\'wood\')">换木材</button>';
        html += '<button class="btn" onclick="marketTrade(\'stone\')">换石材</button>';
      } else {
        var eff = getEffectiveProduce(bldId);
        var costStr = ''; for (var ck in bld.work.cost) costStr += bld.work.cost[ck] + ({ labor:'劳力',food:'食物',wood:'木材',stone:'石材' }[ck]||ck) + '+';
        var prodStr = ''; for (var pk in eff) prodStr += '+' + eff[pk] + ({ labor:'劳力',food:'食物',wood:'木材',stone:'石材' }[pk]||pk) + ' ';
        var canWork = canAfford(bld.work.cost);
        html += '<button class="btn' + (canWork ? '' : ' disabled') + '" onclick="doWork()">工作 (' + costStr.slice(0,-1) + ' → ' + prodStr + ')</button>';
      }
    }
    html += '<button class="btn danger" onclick="demolishBuilding()">拆除</button>';
    panel.innerHTML = html;
  } else {
    var html2 = '<span class="msg">空地 ' + floor + 'F &nbsp; 建造：</span>';
    for (var bi = 0; bi < BLD_LIST.length; bi++) {
      var b = BLD_LIST[bi];
      var fail = RULES.canBuild(b.id, row, col);
      var cs = ''; for (var ck2 in b.cost) cs += b.cost[ck2] + ({ labor:'劳力',food:'食物',wood:'木材',stone:'石材' }[ck2]||ck2) + '+';
      var title = fail ? ' title="' + fail + '"' : '';
      html2 += '<button class="btn' + (fail ? ' disabled' : '') + '" onclick="doBuild(\'' + b.id + '\')"' + title + '><b>' + (bi + 1) + '</b> ' + b.icon + ' ' + b.name + ' (' + cs.slice(0,-1) + ')</button>';
    }
    panel.innerHTML = html2;
  }
}

// ── 键盘 ──
document.addEventListener('keydown', function(e) {
  if (!state.selectedCell) return;
  var sel = state.selectedCell;
  var bldId = state.grid[sel.row][sel.col];
  if (!bldId) {
    var keys = ['1','2','3','4','5'];
    var idx = keys.indexOf(e.key);
    if (idx >= 0 && idx < BLD_LIST.length) {
      var fail = RULES.canBuild(BLD_LIST[idx].id, sel.row, sel.col);
      if (fail) { showFailure(fail); return; }
      doBuild(BLD_LIST[idx].id);
    }
  } else {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doWork(); }
    if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); demolishBuilding(); }
  }
});

// ── 重开 ──
document.getElementById('restart-btn').addEventListener('click', function() {
  clearSave();
  initState();
  updateResourceDisplay();
  updateInfoPanel();
  render();
  log('游戏已重置。每次点击都是真实的劳动价值。');
});

// ── 启动 ──
(function init() {
  if (!loadGame()) initState();
  updateResourceDisplay();
  updateInfoPanel();
  render();
  log('垂直纪元·劳工的诅咒 v3.0 — 师Stellaris七法，规则驱动、范畴承袭');
  setInterval(gameTick, DEF.economy.tickInterval);
  setInterval(function() { render(); }, 1000 / 30);
})();
</script>
